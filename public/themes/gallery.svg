<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-label="Gallery theme preview">
  <!-- Gallery preview: 3-column tile grid, large hero image, image-led.
       Designed to feel "luxe, visual, considered" — for perfumes,
       jewelry, flowers, gift sets. -->
  <defs>
    <linearGradient id="gl-cover" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D4A85A" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#7B5CF5" stop-opacity="0.22"/>
    </linearGradient>
    <linearGradient id="gl-tile-a" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E89AAE"/>
      <stop offset="100%" stop-color="#7B5CF5"/>
    </linearGradient>
    <linearGradient id="gl-tile-b" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4A85A"/>
      <stop offset="100%" stop-color="#C5C5CC"/>
    </linearGradient>
    <linearGradient id="gl-tile-c" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6FA882"/>
      <stop offset="100%" stop-color="#5A8AC8"/>
    </linearGradient>
    <linearGradient id="gl-tile-d" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7B5CF5"/>
      <stop offset="100%" stop-color="#1A1A1F"/>
    </linearGradient>
    <linearGradient id="gl-tile-e" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E89AAE"/>
      <stop offset="100%" stop-color="#D4A85A"/>
    </linearGradient>
    <linearGradient id="gl-tile-f" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5A8AC8"/>
      <stop offset="100%" stop-color="#7B5CF5"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="#FBF8F4"/>
  <!-- Cover band -->
  <rect x="20" y="20" width="360" height="56" rx="14" fill="url(#gl-cover)"/>
  <!-- Logo + name -->
  <rect x="32" y="36" width="24" height="24" rx="8" fill="#1A1A1F" opacity="0.86"/>
  <rect x="64" y="40" width="100" height="7" rx="3.5" fill="#1A1A1F"/>
  <rect x="64" y="54" width="60" height="5" rx="2.5" fill="#1A1A1F" opacity="0.4"/>
  <!-- Magazine grid 2x3 -->
  <g>
    <rect x="20" y="92" width="113" height="96" rx="14" fill="url(#gl-tile-a)"/>
    <rect x="28" y="172" width="40" height="10" rx="5" fill="#FFFFFF" opacity="0.92"/>
    <rect x="100" y="172" width="24" height="10" rx="5" fill="#FFFFFF" opacity="0.42"/>
  </g>
  <g>
    <rect x="143" y="92" width="114" height="96" rx="14" fill="url(#gl-tile-b)"/>
    <rect x="151" y="172" width="44" height="10" rx="5" fill="#FFFFFF" opacity="0.92"/>
    <rect x="223" y="172" width="24" height="10" rx="5" fill="#FFFFFF" opacity="0.42"/>
  </g>
  <g>
    <rect x="267" y="92" width="113" height="96" rx="14" fill="url(#gl-tile-c)"/>
    <rect x="275" y="172" width="36" height="10" rx="5" fill="#FFFFFF" opacity="0.92"/>
    <rect x="347" y="172" width="24" height="10" rx="5" fill="#FFFFFF" opacity="0.42"/>
  </g>
  <g>
    <rect x="20" y="200" width="113" height="92" rx="14" fill="url(#gl-tile-d)"/>
    <rect x="28" y="276" width="50" height="10" rx="5" fill="#FFFFFF" opacity="0.92"/>
  </g>
  <g>
    <rect x="143" y="200" width="114" height="92" rx="14" fill="url(#gl-tile-e)"/>
    <rect x="151" y="276" width="44" height="10" rx="5" fill="#FFFFFF" opacity="0.92"/>
  </g>
  <g>
    <rect x="267" y="200" width="113" height="92" rx="14" fill="url(#gl-tile-f)"/>
    <rect x="275" y="276" width="40" height="10" rx="5" fill="#FFFFFF" opacity="0.92"/>
  </g>
</svg>
