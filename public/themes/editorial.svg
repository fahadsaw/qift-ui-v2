<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-label="Editorial theme preview">
  <!-- Editorial preview: featured story + product rows interleaved.
       Designed to feel "narrative, considered, magazine-like" — for
       Enterprise merchants with brand-led storytelling. -->
  <defs>
    <linearGradient id="ed-hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A1A1F"/>
      <stop offset="100%" stop-color="#7B5CF5"/>
    </linearGradient>
    <linearGradient id="ed-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FAF7F3"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="#FBF8F4"/>
  <!-- Hero band with overlaid headline -->
  <rect x="20" y="20" width="360" height="116" rx="16" fill="url(#ed-hero)"/>
  <!-- Subtle radial highlight -->
  <ellipse cx="180" cy="58" rx="180" ry="40" fill="#FFFFFF" opacity="0.08"/>
  <!-- Eyebrow label -->
  <rect x="36" y="42" width="40" height="6" rx="3" fill="#D4A85A" opacity="0.9"/>
  <!-- Headline -->
  <rect x="36" y="60" width="220" height="11" rx="5.5" fill="#FFFFFF"/>
  <rect x="36" y="78" width="170" height="11" rx="5.5" fill="#FFFFFF"/>
  <!-- Subhead -->
  <rect x="36" y="100" width="220" height="6" rx="3" fill="#FFFFFF" opacity="0.6"/>
  <rect x="36" y="112" width="160" height="6" rx="3" fill="#FFFFFF" opacity="0.6"/>
  <!-- Story / feature row -->
  <g>
    <rect x="20" y="152" width="172" height="64" rx="14" fill="url(#ed-card)" stroke="#EFEAE3"/>
    <rect x="32" y="164" width="44" height="40" rx="10" fill="#E89AAE"/>
    <rect x="86" y="170" width="80" height="7" rx="3.5" fill="#1A1A1F"/>
    <rect x="86" y="184" width="60" height="5" rx="2.5" fill="#1A1A1F" opacity="0.4"/>
    <rect x="86" y="196" width="36" height="10" rx="5" fill="#7B5CF5"/>
  </g>
  <g>
    <rect x="208" y="152" width="172" height="64" rx="14" fill="url(#ed-card)" stroke="#EFEAE3"/>
    <rect x="220" y="164" width="44" height="40" rx="10" fill="#D4A85A"/>
    <rect x="274" y="170" width="80" height="7" rx="3.5" fill="#1A1A1F"/>
    <rect x="274" y="184" width="60" height="5" rx="2.5" fill="#1A1A1F" opacity="0.4"/>
    <rect x="274" y="196" width="36" height="10" rx="5" fill="#7B5CF5"/>
  </g>
  <!-- Trailing list row -->
  <g>
    <rect x="20" y="232" width="360" height="48" rx="14" fill="url(#ed-card)" stroke="#EFEAE3"/>
    <rect x="32" y="244" width="24" height="24" rx="8" fill="#6FA882" opacity="0.55"/>
    <rect x="64" y="248" width="140" height="7" rx="3.5" fill="#1A1A1F"/>
    <rect x="64" y="262" width="80" height="5" rx="2.5" fill="#1A1A1F" opacity="0.4"/>
    <rect x="328" y="250" width="40" height="14" rx="7" fill="#7B5CF5"/>
  </g>
</svg>
